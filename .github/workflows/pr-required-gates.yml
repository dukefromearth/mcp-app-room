name: pr-required-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  required-gates:
    runs-on: ubuntu-latest
    env:
      REAL_MCP_ARTIFACT_DIR: artifacts/real-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Run verify gate
        run: npm run verify

      - name: Run real-MCP integration gate
        run: npm run test:integration:real-mcp

      - name: Upload real-MCP artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-mcp-artifacts
          path: |
            artifacts/real-mcp
            test-results
            playwright-report
