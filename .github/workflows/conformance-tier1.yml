name: conformance-tier1

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conformance-tier1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tier 1 conformance gate
        run: npm run conformance:tier1

      - name: Upload conformance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-tier1-artifacts
          path: artifacts/conformance
