# Global runtime config for mcp-app-room.
# This file is the canonical source for local runtime wiring.

version: 1

roomd:
  baseUrl: "http://localhost:8092"

host:
  mode: "room"
  roomId: "demo"
  # Optional preconfigured room bootstrap (loaded once when room is empty).
  # roomConfigId: "banking-room"
  # roomConfigNamespace: "default"
  ports:
    host: 8980
    sandbox: 8981
  browser:
    remoteDebuggingPort: 9222
  servers:
    - "http://localhost:3101/mcp"

security:
  # strict | local-dev
  profile: "local-dev"
